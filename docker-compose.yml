services:
  app:
    build: .
    container_name: messaging-officer
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./auth:/app/auth
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - manda-pra-mim

networks:
  manda-pra-mim:
    external: true
